<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classwork</title>
    <link rel="stylesheet" href="./style.css">
    <style></style>
</head>

<body>
    <h1>Contact Me</h1>
    <form action="">
        <div class="firstinput">
            <label for="your first name"> Your First Name </label><br>
            <input type="text" name="your first name" id="your first name" placeholder="First Name" />
        </div>
        <br>
        <div class="lastinput">
            <label for="your last name"> Your Last Name </label><br>
            <input type="text" name="your last name" id="your last name" placeholder="Last Name" />
        </div>
        <br>

        <div class="address input">
            <label for="your email address"> Your Email Address </label><br>
            <input type="email" name="your email address" id="your email address" placeholder="daniele@example.com">
        </div>
        <br>
        <div class="phone number input">
            <label for="your phone number"> Your Phone Number </label><br>
            <input type="tel" name="your phone number" id="your phone number" placeholder="08034567890">
        </div>
        <br>
        <div class="reason input">
            <label for="reason for contact"> Reason For Contact </label><br>
            <textarea name="reason for contact" cols="30" rows="10" placeholder="Enter the reason for your contact"></textarea>
        </div>
        <br>
        <a href="#">Submit</a>
    </form>
</body>

</html>
